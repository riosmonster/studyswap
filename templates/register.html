{% extends "base.html" %}
{% block title %}Cadastrar · StudySwap{% endblock %}
{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">S</span>
        <span>StudySwap</span>
      </a>
      <h1>Criar conta</h1>
      <p>Use seu e-mail de matrícula <strong>@alunos.ibmec.edu.br</strong></p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="field">
        <label for="name">Nome completo</label>
        <input id="name" name="name" type="text"
               placeholder="Seu nome completo"
               value="{{ name or '' }}"
               autocomplete="name" required>
      </div>

      <div class="field">
        <label for="email">E-mail de matrícula</label>
        <input id="email" name="email" type="email"
               placeholder="matricula@alunos.ibmec.edu.br"
               value="{{ email or '' }}"
               autocomplete="email" required>
        <span class="field-hint">Formato: sua matrícula + @alunos.ibmec.edu.br</span>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <div class="password-wrapper">
          <input id="password" name="password" type="password"
                 placeholder="Mínimo 6 caracteres"
                 autocomplete="new-password" required>
          <button type="button" class="eye-btn" data-target="password" aria-label="Mostrar senha">
            <svg class="eye-icon eye-closed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="confirm">Confirmar senha</label>
        <div class="password-wrapper">
          <input id="confirm" name="confirm" type="password"
                 placeholder="Repita a senha"
                 autocomplete="new-password" required>
          <button type="button" class="eye-btn" data-target="confirm" aria-label="Mostrar confirmação">
            <svg class="eye-icon eye-closed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" type="submit">Criar conta</button>
    </form>

    <p class="auth-switch">
      Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
    </p>
  </div>
</div>

{% endblock %}
