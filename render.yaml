services:
  - type: web
    name: studyswap
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATA_DIR
        value: /tmp/studyswap
      - key: SECRET_KEY
        generateValue: true
